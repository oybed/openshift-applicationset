---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: namespaces
  namespace: openshift-gitops
spec:
  generators:
    - clusters: {}
  template:
    metadata:
      name: namespaces
    spec:
      project: default
      source:
        repoURL: https://github.com/oybed/openshift-applicationset
        path: charts/namespaces
        targetRevision: HEAD
        helm:
          valueFiles:
            - values.yaml
          parameters:
            - name: foo
              value: bar
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
