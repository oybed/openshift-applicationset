---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: namespaces
  namespace: openshift-gitops
spec:
  generators:
    - clusters: {}
  template:
    metadata:
      name: '{{env}}-namespaces'
    spec:
      project: default
      source:
        # Sourcing straight from a Helm registry
        repoURL: https://github.com/oybed/openshift-applicationset
        chart: charts/namespaces
        targetRevision: HEAD
        helm:
          parameters:
            - name: foo
              value: bar
      destination:
        server: '{{cluster}}'
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
