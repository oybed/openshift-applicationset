---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: namespaces
  namespace: openshift-gitops
spec:
  generators:
    - clusters: {}
  template:
    metadata:
      name: namespaces
    spec:
      project: default
      sources:
        - repoURL: https://github.com/oybed/openshift-applicationset
          path: charts/namespaces
          targetRevision: HEAD
          helm:
            valueFiles:
              - values.yaml
              - $values-repo/values.yaml
            parameters:
              - name: foo
                value: bar
        - repoURL: https://github.com/oybed/openshift-applicationset
          path: values
          targetRevision: HEAD
          ref: values-repo
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
